   <title>Current Conditions</title>

   <link rel="canonical" href="https://waconia.triquence.org/weather-table.html" />

   <link href="sitemap.css?v=85" rel="stylesheet" type="text/css">
   <style>
      select, button {
         font-size: 95%;
      }
      #reloadBtn {
         width: 70px;
         height: 22px;
         border-radius: 3px;
         border-width: 1px;
      }
      #chartDuration {
         height: 22px;
         border-radius: 3px;
         border-width: 1px;
      }
      .conditions-table {
         border-collapse: collapse;
         font-family: Arial, sans-serif;
         font-size: 14px;
         margin-top: 8px;
      }
      .conditions-table th,
      .conditions-table td {
         border: 1px solid #ccc;
         padding: 4px 8px;
         white-space: nowrap;
      }
      .conditions-table thead tr {
         background-color: #e0e8f0;
      }
      .conditions-table th {
         font-weight: bold;
      }
      .conditions-table th.ct-sortable {
         cursor: pointer;
         user-select: none;
         background-color: #d0e4f7;
      }
      .conditions-table th.ct-sortable:hover {
         background-color: #b0cce8;
      }
      .conditions-table th.ct-sort-active {
         background-color: #a8c8e8;
      }
      .conditions-table th.ct-sort-secondary {
         background-color: #a8c8e8;
      }
      .conditions-table tbody tr:nth-child(even) {
         background-color: #f5f5f5;
      }
      .conditions-table tbody tr:hover {
         background-color: #fff8e8;
      }
      .ct-num {
         text-align: right;
      }
      .ct-dir {
         text-align: center;
      }
      .ct-age {
         text-align: right;
         color: #888;
         font-size: 12px;
      }
      .conditions-table td a {
         color: #333;
         text-decoration: none;
      }
      .conditions-table td a:hover {
         text-decoration: underline;
         color: maroon;
      }
      #conditionsStatus {
         font-family: Arial, sans-serif;
         font-size: 14px;
         color: #555;
         margin: 8px 0;
      }
      .ct-titlebar {
         display: flex;
         align-items: center;
         gap: 10px;
         margin: 0 0 4px 0;
      }
      .ct-titlebar h2 {
         margin: 0;
      }
      .page-note {
         font-family: Arial, sans-serif;
         font-size: 12px;
         color: #777;
         margin-top: 4px;
      }
      .ct-region {
         font-size: 12px;
         color: #555;
         white-space: nowrap;
      }
      /* Stale rows (data older than 3 hours) */
      .conditions-table tr.ct-stale td {
         color: #bbb;
      }
      .conditions-table tr.ct-stale td a {
         color: #bbb;
      }
      /* Match weather.html: keep menu icon in normal flow so title sits beside it */
      .menuicon {
         position: relative;
         margin-right: 8px;
      }
      /* Ensure nav overlay renders above table content */
      .overlay {
         z-index: 100;
      }
      /* Split layout: table left, chart right */
      .ct-split {
         display: flex;
         align-items: stretch;
         gap: 12px;
         margin-top: -29px;
         margin-left: 35px;
         width: max-content;
         min-width: calc(100vw - 45px);
      }
      .ct-left {
         flex: 0 0 auto;
         overflow-y: auto;
         max-height: calc(100vh - 25px);
         padding-right: 8px;
         scrollbar-width: thin;
         scrollbar-color: #a0b8cc transparent;
      }
      .ct-left::-webkit-scrollbar { width: 6px; }
      .ct-left::-webkit-scrollbar-thumb { background: #a0b8cc; border-radius: 3px; }
      .ct-left::-webkit-scrollbar-track { background: transparent; }
      .ct-right {
         flex: 1 0 560px;
         min-width: 560px;
         overflow-y: auto;
         max-height: calc(100vh - 25px);
         scrollbar-width: thin;
         scrollbar-color: #a0b8cc transparent;
      }
      .ct-right::-webkit-scrollbar { width: 6px; }
      .ct-right::-webkit-scrollbar-thumb { background: #a0b8cc; border-radius: 3px; }
      .ct-right::-webkit-scrollbar-track { background: transparent; }
      #chartFrame {
         width: 100%;
         height: calc(100vh - 25px);
         border: 1px solid #ccc;
         background: #ffffff;
      }
      #chartPlaceholder {
         font-family: Arial, sans-serif;
         font-size: 13px;
         color: #aaa;
         padding: 24px;
      }
      @media (max-width: 900px) {
         #conditionsPageBody {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
         }
         #conditionsPageBody .pageblock {
            width: max-content;
            max-width: none;
         }
      }
   </style>

   <noscript>
      <p style="font-family:Helvetica; font-size:150%; color:brown;">
      This page requires JavaScript. Please enable it and reload.
      </p>
   </noscript>

   <script type="text/javascript" src="jquery-3.7.1.min.js?v=56"></script>
   <!-- loader for google charts (required by wcharts.js module) -->
   <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

   <script type="text/javascript" src="wcharts.js?v=85"></script>

   <!-- The navigation menu -->
   <script src="utilities.js?v=85"></script>
   <script src="pageStuff.js?v=85"></script>
   <script>
      // Embedded chart iframe (chartFrame) loads weather.html?embed=1&nocontrols=1.
      // The iframe suppresses its nav/controls via URL params and calls wC.initEmbedded().
      // A postMessage handshake is used to avoid sending chart requests before Google Charts
      // has finished loading inside the iframe:
      //   - First station click: set iframe.src, store station in m_pendingStation/m_pendingDays.
      //   - iframe fires 'iframeReady' once Google Charts is loaded and the message listener is wired.
      //   - We set m_frameReady=true and dispatch the pending station request.
      //   - Subsequent clicks post directly (m_frameReady is already true).
      // See also: initEmbedded() in wcharts.js for the iframe side of this protocol.
      var m_frameReady = false;
      var m_pendingStation = null;
      var m_pendingDays = null;

      window.addEventListener('message', function(evt) {
         if (evt.data && evt.data.type === 'iframeReady') {
            m_frameReady = true;
            // If a station click arrived before the iframe was ready, send it now
            if (m_pendingStation) {
               var frame = document.getElementById('chartFrame');
               frame.contentWindow.postMessage({type: 'loadStation', station: m_pendingStation, days: m_pendingDays}, '*');
               m_pendingStation = null;
               m_pendingDays = null;
            }
         }
      });

      $(window).on('load', function() {
         pS.init({"pageDesc":"Waconia: Current Conditions", "scrollAtLoad":false});
         wC.initConditionsTable();
      });

      function loadChart(baseUrl, longName) {
         var dur = document.getElementById('chartDuration').value;
         var newTab = document.getElementById('chkNewTab').checked;
         var stationMatch = baseUrl.match(/[?&]station=([^&]+)/);
         var station = stationMatch ? decodeURIComponent(stationMatch[1]) : null;
         var url = baseUrl.replace(/([?&]days=)[^&]+/, '$1' + dur);
         pS.logEntry('CC chart: ' + (longName || station || '?') + ', ' + dur);
         if (newTab) {
            window.open(url, '_blank');
         } else {
            var frame = document.getElementById('chartFrame');
            var placeholder = document.getElementById('chartPlaceholder');
            placeholder.style.display = 'none';
            frame.style.display = 'block';
            if (m_frameReady && station) {
               frame.contentWindow.postMessage({type: 'loadStation', station: station, days: dur}, '*');
            } else {
               // Iframe not yet loaded: set src to load it, store station to send when iframeReady fires
               m_pendingStation = station;
               m_pendingDays = dur;
               frame.src = 'weather.html?embed=1&nocontrols=1&v=85';
            }
         }
      }
   </script>
</head>

<body id="conditionsPageBody" style="font-family: Arial;">

<!-- The navigation menu -->
<div id="navDiv"></div>

<div class='pageblock'>
<img class="menuicon" id="opener" src="images/menu.svg" alt="" style="cursor:pointer;">

<div class="ct-split">
   <div class="ct-left">
      <div class="ct-titlebar">
         <h2>Current Conditions</h2>
         <button id="reloadBtn" title="Refresh current conditions data" onclick="wC.queryCurrentConditions()">Update</button>
         <select id="chartDuration" title="Chart duration">
            <option value="24h" title="24 hours" selected>24h</option>
            <option value="2"   title="2 days"   >2d</option>
            <option value="5"   title="5 days"   >5d</option>
         </select>
         <label style="font-size:13.3px;" title="Open chart in a new browser tab instead of the right panel">
            <input type="checkbox" id="chkNewTab"> New tab
         </label>
         <span id="conditionsStatus"></span>
      </div>
      <p class="page-note">Click a column header to sort. Click a station name to view its chart. <span id="conditionsAsOf"></span></p>
      <div id="conditionsTableDiv"></div>
   </div>
   <div class="ct-right">
      <div id="chartPlaceholder">Click a station name to view its chart.</div>
      <iframe id="chartFrame" style="display:none; border:none;" frameborder="0"></iframe>
   </div>
</div>

</div>
</body>
</html>
